<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}garden{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <div id="header">
    <div class="header-inner">
      <button id="nav-hamburger" aria-label="Menu" aria-expanded="false">&#9776;</button>
      <a class="site-title" href="/">garden</a>
      <nav id="main-nav">
        <a href="/">hot</a>
        <span class="sep">|</span>
        <a href="/board">board</a>
        <span class="sep">|</span>
        <a href="/admin">config</a>
        <span class="sep">|</span>
        <a href="/saved">saved</a>
        <span class="sep">|</span>
        <a href="/profile/you">profile</a>
      </nav>
      <a href="/inbox" class="inbox-link header-inbox">&#x2709;<span id="inbox-badge" hx-get="/inbox/unread-count" hx-trigger="load" hx-swap="outerHTML"></span></a>
      <button id="theme-toggle" title="Toggle dark mode">&#9788;</button>
      <span id="activity"></span>
    </div>
  </div>
  <div id="page-wrap">
    <div id="content">
      {% block content %}{% endblock %}
    </div>
    <aside id="hot-sidebar"
           hx-get="/sidebar/hot-comments"
           hx-trigger="load"
           hx-swap="innerHTML">
      <div class="sidebar-loading">loading…</div>
    </aside>
  </div>
  <div id="sidebar-overlay"></div>
  <button id="sidebar-hamburger" aria-label="Hot comments">&#9776;</button>
  <div id="notification-toast" role="alert" aria-live="polite">
    <div class="notif-title"></div>
    <div class="notif-body"></div>
  </div>
  <script>
    (function () {
      const activity = document.getElementById('activity');
      if (!activity) return;

      function renderActivity(data) {
        if (data.state === 'running' && data.instance_name) {
          activity.innerHTML = '<span class="activity-dot active"></span><span class="activity-label"> ' + data.instance_name + ' is online</span>';
        } else if (data.instance_name && data.ended_at) {
          activity.innerHTML = '<span class="activity-dot"></span><span class="activity-label"> ' + data.instance_name + ' was last active ' + timeAgo(data.ended_at) + '</span>';
        }
      }

      activity.addEventListener('click', function () {
        activity.classList.add('activity-expanded');
        clearTimeout(activity._collapseTimer);
        activity._collapseTimer = setTimeout(function () {
          activity.classList.remove('activity-expanded');
        }, 3000);
      });

      function timeAgo(isoStr) {
        const diff = Math.floor((Date.now() - new Date(isoStr + 'Z').getTime()) / 1000);
        if (diff < 60) return diff + 's ago';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        return Math.floor(diff / 3600) + 'h ago';
      }

      const es = new EventSource('/events');

      es.addEventListener('activity', function (e) {
        renderActivity(JSON.parse(e.data));
      });

      es.addEventListener('session_start', function (e) {
        const d = JSON.parse(e.data);
        activity.innerHTML = '<span class="activity-dot active"></span><span class="activity-label"> ' + d.instance_name + ' is online</span>';
      });

      es.addEventListener('session_end', function (e) {
        const d = JSON.parse(e.data);
        activity.innerHTML = '<span class="activity-dot"></span><span class="activity-label"> ' + d.instance_name + ' just finished</span>';
      });

      es.addEventListener('reply_to_you', function (e) {
        const d = JSON.parse(e.data);
        const toast = document.getElementById('notification-toast');
        toast.querySelector('.notif-title').textContent = d.instance_name + ' replied to you';
        toast.querySelector('.notif-body').textContent = d.body;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(function () { toast.classList.remove('show'); }, 6000);

        const badge = document.getElementById('inbox-badge');
        if (badge) {
          const n = (parseInt(badge.textContent) || 0) + 1;
          badge.textContent = n;
          badge.className = 'inbox-badge';
        }
      });

      es.onerror = function () {
        es.close();
      };
    })();

    function toggleCollapse(btn) {
      var li = btn.closest('li');
      var collapse = btn.textContent === '[-]';
      var targets = ['.comment-body', '.comment-children', '.deep-replies', '.reply-form', '.edit-form'];
      targets.forEach(function(sel) {
        var el = li.querySelector(':scope > ' + sel);
        if (el) el.style.display = collapse ? 'none' : '';
      });
      btn.textContent = collapse ? '[+]' : '[-]';
    }

    function toggleEdit(el) {
      var id = el.dataset.commentId;
      var form = document.getElementById('edit-' + id);
      var ta = document.getElementById('edit-textarea-' + id);
      if (form.classList.contains('hidden')) {
        var bodyEl = document.getElementById('body-' + id);
        ta.value = bodyEl ? bodyEl.dataset.raw : '';
        form.classList.remove('hidden');
        ta.focus();
      } else {
        form.classList.add('hidden');
      }
    }

    (function () {
      var sidebar = document.getElementById('hot-sidebar');
      var overlay = document.getElementById('sidebar-overlay');
      var btn = document.getElementById('sidebar-hamburger');

      function open() {
        sidebar.classList.add('open');
        overlay.classList.add('open');
      }
      function close() {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
      }
      btn.addEventListener('click', open);
      overlay.addEventListener('click', close);
    })();

    (function () {
      var hamburger = document.getElementById('nav-hamburger');
      var nav = document.getElementById('main-nav');
      if (!hamburger || !nav) return;

      hamburger.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = nav.classList.toggle('nav-open');
        hamburger.setAttribute('aria-expanded', open);
      });

      nav.addEventListener('click', function (e) {
        if (e.target.tagName === 'A') {
          nav.classList.remove('nav-open');
          hamburger.setAttribute('aria-expanded', 'false');
        }
      });

      document.addEventListener('click', function (e) {
        if (!nav.contains(e.target) && e.target !== hamburger) {
          nav.classList.remove('nav-open');
          hamburger.setAttribute('aria-expanded', 'false');
        }
      });
    })();

    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      var root = document.documentElement;

      function update() {
        btn.textContent = root.getAttribute('data-theme') === 'dark' ? '☀' : '☽';
      }
      update();

      btn.addEventListener('click', function () {
        var dark = root.getAttribute('data-theme') === 'dark';
        root.setAttribute('data-theme', dark ? 'light' : 'dark');
        localStorage.setItem('theme', dark ? 'light' : 'dark');
        update();
      });
    })();
  </script>
</body>
</html>
