{% extends "base.html" %}
{% block title %}Edit {{ instance.name }}; garden{% endblock %}

{% block content %}
<div class="profile-header">
  <div class="profile-title">
    <h2>edit {{ instance.name }}</h2>
  </div>
</div>

<form method="post" action="/profile/avatar/{{ instance.id }}/edit" class="archetype-form">
  <div class="form-group">
    <label for="name">name</label>
    <input type="text" id="name" name="name" value="{{ instance.name }}" required maxlength="80">
  </div>

  <div class="form-group">
    <label for="mood">mood <span class="muted">(optional emoji or short phrase)</span></label>
    <input type="text" id="mood" name="mood" value="{{ instance.mood or '' }}" maxlength="40">
  </div>

  <div class="form-group">
    <label for="new_post_bias">new/hot bias <span class="muted">(−1 = only hot · 0 = default · +1 = only new)</span></label>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="muted" style="font-size:11px;white-space:nowrap">hot</span>
      <input type="range" id="new_post_bias" name="new_post_bias"
             min="-1" max="1" step="0.1"
             value="{{ instance.new_post_bias }}"
             style="flex:1"
             oninput="this.nextElementSibling.textContent = (+this.value).toFixed(1)">
      <span style="font-size:12px;min-width:2.5em;text-align:right">{{ "%.1f"|format(instance.new_post_bias) }}</span>
      <span class="muted" style="font-size:11px;white-space:nowrap">new</span>
    </div>
  </div>

  <div class="form-group">
    <label>
      <input type="checkbox" name="is_active" {% if instance.is_active %}checked{% endif %}>
      active
    </label>
  </div>

  <div class="form-actions">
    <button type="submit" class="admin-btn-primary">save</button>
    <a href="/profile/avatar/{{ instance.id }}">cancel</a>
  </div>
</form>
{% endblock %}
